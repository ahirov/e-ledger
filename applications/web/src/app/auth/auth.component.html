<div class="row">
    <div
        class="col-sm-10 offset-sm-1 col-md-8 offset-md-2 col-lg-6 offset-lg-3 p-4 bg-light rounded">
        <div class="text-center">
            <p class="el-title d-inline-block align-middle fs-1">E~Ledger</p>
            <img class="d-inline-block" src="assets/TitleImage.svg" />
        </div>
        <form
            #elAuthForm="ngForm"
            autocomplete="off"
            novalidate
            (ngSubmit)="onSubmit(elAuthForm)">
            <div class="input-group my-2">
                <span class="input-group-text">Email:</span>
                <input
                    class="form-control"
                    type="email"
                    name="email"
                    ngModel
                    email
                    required
                    (focus)="onFocus()" />
            </div>
            <div class="input-group my-2">
                <span class="input-group-text">Password:</span>
                <input
                    class="form-control"
                    type="password"
                    name="password"
                    ngModel
                    required
                    elEqualPasswords="passwordConfirm"
                    [minlength]="passwordMinLength"
                    (focus)="onFocus()" />
            </div>
            <div *ngIf="isSignUpMode" [@authSignUpTrigger] class="input-group">
                <span class="input-group-text">Password:</span>
                <input
                    class="form-control"
                    type="password"
                    name="passwordConfirm"
                    placeholder="confirm the password.."
                    ngModel
                    required
                    elEqualPasswords="password"
                    (focus)="onFocus()" />
            </div>
            <div
                *ngIf="isSignUpMode"
                [@authSignUpTrigger]
                class="el-space"></div>
            <div class="d-flex flex-row mb-1">
                <div class="el-form-switch form-switch form-check">
                    <input
                        type="checkbox"
                        class="form-check-input"
                        (change)="onAuthSignUpChange($event)" />
                    <label class="form-check-label">Sign up</label>
                </div>
                <div>
                    <p
                        *ngFor="let error of getErrorMessages(elAuthForm)"
                        [@authErrorTrigger]
                        class="el-text-small text-danger">
                        {{ error }}
                    </p>
                </div>
            </div>
            <div class="text-center">
                <button
                    type="submit"
                    class="btn btn-primary fw-bold"
                    [disabled]="formSubmitted && elAuthForm.invalid">
                    Continue
                </button>
            </div>
        </form>
    </div>
</div>
