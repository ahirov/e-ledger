<ng-template #elUserTooltip
    >User data<br />(all fields are required)</ng-template
>
<ng-template #elWorkflowTooltip
    >Saving data to the server<br />(required)</ng-template
>
<div class="el-user-box">
    <p class="mt-3 mb-2 text-end fw-bold">
        User<img
            class="align-top"
            src="../../../assets/QuestionMark.svg"
            [tooltip]="elUserTooltip"
            placement="left" />:
    </p>
    <form
        #elSettingForm="ngForm"
        autocomplete="off"
        novalidate
        (ngSubmit)="onSubmit(elSettingForm)">
        <div class="input-group input-group-sm mb-3">
            <span class="input-group-text">Email:</span>
            <input
                class="form-control"
                type="email"
                name="email"
                [(ngModel)]="email"
                email
                required />
        </div>
        <div class="input-group input-group-sm mb-3">
            <span class="input-group-text">Password:</span>
            <input
                class="form-control"
                type="password"
                name="password"
                [(ngModel)]="password"
                passwordsIdentical="passwordConfirm"
                (focus)="onPasswordFocus()" />
        </div>
        <div class="input-group input-group-sm mb-3">
            <span class="input-group-text">Password:</span>
            <input
                class="form-control"
                type="password"
                name="passwordConfirm"
                placeholder="confirm the password.."
                [(ngModel)]="passwordConfirm"
                passwordsIdentical="password"
                (focus)="onPasswordFocus()" />
        </div>
        <hr />
        <p class="mb-2 text-end fw-bold">
            Workflow<img
                class="align-top"
                src="../../../assets/QuestionMark.svg"
                [tooltip]="elWorkflowTooltip"
                placement="left" />:
        </p>
        <div class="input-group input-group-sm mb-3">
            <label class="input-group-text">Sync period:</label>
            <ng-select
                class="form-control"
                name="syncMode"
                ngModel
                required
                [clearable]="false">
                <ng-option *ngFor="let item of syncModes" [value]="item.id">
                    {{ item.name }}
                </ng-option>
            </ng-select>
        </div>
        <div class="row mt-3 mb-4 text-center">
            <div class="col-6">
                <button
                    type="submit"
                    class="btn btn-sm btn-primary fw-bold"
                    [disabled]="elSettingForm.invalid">
                    Save
                </button>
            </div>
            <div class="col-6">
                <button
                    type="button"
                    class="btn btn-sm btn-primary fw-bold"
                    (click)="onCancel()">
                    Cancel
                </button>
            </div>
        </div>
    </form>
</div>
