<ng-template #elExportTooltip
    >Save data to a file<br />(all fields are required)</ng-template
>
<ng-template #elImportTooltip
    >Upload data from a file<br />(file field is required)</ng-template
>
<div class="el-transfer-box mx-lg-4">
    <div>
        <p class="mt-3 text-end fw-bold">
            Export<img
                class="align-top"
                src="../../../assets/QuestionMark.svg"
                [tooltip]="elExportTooltip"
                placement="left" />:
        </p>
        <form
            #elExportForm="ngForm"
            autocomplete="off"
            novalidate
            (ngSubmit)="onExportSubmit(elExportForm)">
            <div class="row">
                <div class="col-md-6 order-md-last">
                    <div class="input-group input-group-sm my-2">
                        <label class="input-group-text">Extension:</label>
                        <ng-select
                            class="form-control"
                            name="extension"
                            ngModel
                            required>
                            <ng-option
                                *ngFor="let item of extensions"
                                [value]="item">
                                {{ item.toUpperCase() }}
                            </ng-option>
                        </ng-select>
                    </div>
                </div>
                <div class="col-md-6 order-md-first">
                    <div class="input-group input-group-sm my-2">
                        <span class="input-group-text">From:</span>
                        <input
                            #elFrom="ngModel"
                            type="text"
                            class="elDynamicValidation form-control"
                            name="from"
                            ngModel
                            required
                            bsDatepicker
                            [bsConfig]="{
                                isAnimated: true,
                                dateInputFormat: 'DD/MM/YYYY'
                            }"
                            (onHidden)="elFrom.control.markAsDirty()" />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="input-group input-group-sm my-2">
                        <span class="input-group-text">To:</span>
                        <input
                            #elTo="ngModel"
                            type="text"
                            class="elDynamicValidation form-control"
                            name="to"
                            ngModel
                            required
                            bsDatepicker
                            [bsConfig]="{
                                isAnimated: true,
                                dateInputFormat: 'DD/MM/YYYY'
                            }"
                            (onHidden)="elTo.control.markAsDirty()" />
                    </div>
                </div>
                <div class="col-md-6 d-flex justify-content-center">
                    <button
                        type="submit"
                        class="btn btn-sm btn-primary my-2 w-50 fw-bold"
                        [disabled]="elExportForm.invalid">
                        Download
                    </button>
                </div>
            </div>
        </form>
    </div>
    <div>
        <p class="mt-3 text-end fw-bold">
            Import<img
                class="align-top"
                src="../../../assets/QuestionMark.svg"
                [tooltip]="elImportTooltip"
                placement="left" />:
        </p>
        <form
            #elImportForm="ngForm"
            autocomplete="off"
            novalidate
            (ngSubmit)="onImportSubmit(elImportForm)">
            <div class="row">
                <div class="col-md-12">
                    <div class="my-2">
                        <input
                            type="file"
                            class="elDynamicValidation form-control form-control-sm"
                            name="file"
                            ngModel
                            required
                            (change)="onFileChange($event)" />
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-check form-control-sm my-2 pt-0 pb-0">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            name="isRewritten"
                            ngModel />
                        <label class="form-check-label"
                            >Rewrite data<sup class="text-danger">#</sup><br />
                            <span
                                *ngIf="modeService.savedMode === MODE.Income"
                                class="el-text-small text-danger">
                                <sup>#</sup>based on range and source
                            </span>
                            <span
                                *ngIf="modeService.savedMode === MODE.Outcome"
                                class="el-text-small text-danger">
                                <sup>#</sup>based on date and category
                            </span></label
                        >
                    </div>
                </div>
                <div class="col-md-6 d-flex justify-content-center">
                    <button
                        type="submit"
                        class="btn btn-sm btn-primary my-2 w-50 fw-bold"
                        [disabled]="elImportForm.invalid">
                        Upload
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
