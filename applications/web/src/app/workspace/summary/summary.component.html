<div class="el-summary-box mx-lg-4">
    <p class="mt-3 text-end fw-bold">Summary:</p>
    <form
        #elSummaryForm="ngForm"
        autocomplete="off"
        novalidate
        (ngSubmit)="onSubmit(elSummaryForm)">
        <div class="row">
            <div
                *ngIf="modeService.savedMode === MODE.Income"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Source:</label>
                    <ng-select
                        class="form-control"
                        name="source"
                        [(ngModel)]="sourceId">
                        <ng-option
                            *ngFor="let item of sources$ | async"
                            [value]="item.id">
                            {{ item.name }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Income"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">From:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="incomeFrom"
                        [(ngModel)]="incomeFrom"
                        datepicker />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Category:</label>
                    <ng-select
                        class="form-control"
                        name="category"
                        [(ngModel)]="categoryId">
                        <ng-option
                            *ngFor="let item of categories$ | async"
                            [value]="item.id">
                            {{ item.name }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">From:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="outcomeFrom"
                        [(ngModel)]="outcomeFrom"
                        datepicker />
                </div>
            </div>
        </div>
        <div class="row">
            <div *ngIf="modeService.savedMode === MODE.Income" class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">To:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="incomeTo"
                        [(ngModel)]="incomeTo"
                        datepicker />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">To:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="outcomeTo"
                        [(ngModel)]="outcomeTo"
                        datepicker />
                </div>
            </div>
            <div class="col-md-6 d-flex">
                <button
                    type="submit"
                    class="btn btn-sm btn-primary w-50 me-4 my-2 fw-bold">
                    Search
                </button>
                <button
                    type="button"
                    class="btn btn-sm btn-primary w-50 ms-4 my-2 fw-bold"
                    (click)="onReset(elSummaryForm)">
                    Clear
                </button>
            </div>
        </div>
    </form>
    <div>
        <el-list-pagination [mode]="modeService.savedMode"></el-list-pagination>
    </div>
</div>
