<div class="el-summary-box mx-lg-4">
    <p class="mt-3 text-end fw-bold">Filter:</p>
    <form
        #elSummaryForm="ngForm"
        autocomplete="off"
        novalidate
        (ngSubmit)="onSubmit(elSummaryForm)">
        <div class="row">
            <div
                *ngIf="modeService.savedMode === MODE.Income"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Source:</label>
                    <ng-select
                        class="form-control"
                        name="source"
                        [(ngModel)]="source">
                        <ng-option
                            *ngFor="let item of SOURCE | enumToPairs"
                            [value]="item[0]">
                            {{ item[1] }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Income"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">From:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="startedAt"
                        [(ngModel)]="startedAt"
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Category:</label>
                    <ng-select
                        class="form-control"
                        name="category"
                        [(ngModel)]="category">
                        <ng-option
                            *ngFor="let item of CATEGORY | enumToPairs"
                            [value]="item[0]">
                            {{ item[1] }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">Date:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="processedAt"
                        [(ngModel)]="processedAt"
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
        </div>
        <div class="row">
            <div *ngIf="modeService.savedMode === MODE.Income" class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">To:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="endedAt"
                        [(ngModel)]="endedAt"
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === MODE.Outcome"
                class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">Details:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="description"
                        [(ngModel)]="description" />
                </div>
            </div>
            <div class="col-md-6 d-flex">
                <button
                    type="submit"
                    class="btn btn-sm btn-primary w-50 me-4 my-2 fw-bold">
                    Search
                </button>
                <button
                    type="button"
                    class="btn btn-sm btn-primary w-50 ms-4 my-2 fw-bold"
                    (click)="onReset(elSummaryForm)">
                    Clear
                </button>
            </div>
        </div>
    </form>
    <div>
        <el-list-pagination [mode]="modeService.savedMode"></el-list-pagination>
    </div>
</div>
