<div class="el-summary-box mx-lg-4">
    <p class="mt-3 text-end fw-bold">Filter:</p>
    <form
        #elSummaryForm="ngForm"
        autocomplete="off"
        novalidate
        (ngSubmit)="onSubmit(elSummaryForm)">
        <div class="row">
            <div
                *ngIf="modeService.savedMode === mode.Income"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Source:</label>
                    <ng-select class="form-control" name="source" ngModel>
                        <ng-option
                            *ngFor="let item of source | enumToPairs"
                            [value]="item[0]">
                            {{ item[1] }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === mode.Income"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">From:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="startedAt"
                        ngModel
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === mode.Outcome"
                class="col-md-6 order-md-last">
                <div class="input-group input-group-sm my-2">
                    <label class="input-group-text">Category:</label>
                    <ng-select class="form-control" name="category" ngModel>
                        <ng-option
                            *ngFor="let item of category | enumToPairs"
                            [value]="item[0]">
                            {{ item[1] }}
                        </ng-option>
                    </ng-select>
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === mode.Outcome"
                class="col-md-6 order-md-first">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">Date:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="processedAt"
                        ngModel
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
        </div>
        <div class="row">
            <div *ngIf="modeService.savedMode === mode.Income" class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">To:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="endedAt"
                        ngModel
                        bsDatepicker
                        [bsConfig]="{
                            isAnimated: true,
                            dateInputFormat: 'DD/MM/YYYY'
                        }" />
                </div>
            </div>
            <div
                *ngIf="modeService.savedMode === mode.Outcome"
                class="col-md-6">
                <div class="input-group input-group-sm my-2">
                    <span class="input-group-text">Details:</span>
                    <input
                        type="text"
                        class="form-control"
                        name="description"
                        ngModel />
                </div>
            </div>
            <div class="col-md-6 text-center">
                <button class="btn btn-sm btn-primary my-2 fw-bold">
                    Search
                </button>
            </div>
        </div>
    </form>
    <div>
        <el-list [mode]="modeService.savedMode" [showItems]="6"></el-list>
    </div>
    <nav>
        <ul class="pagination pagination-sm justify-content-center mt-3 mb-4">
            <li class="page-item">
                <a href="#" class="page-link"><span>&laquo;</span></a>
            </li>
            <li class="page-item"><a href="#" class="page-link">1</a></li>
            <li class="page-item active">
                <a href="#" class="page-link">2</a>
            </li>
            <li class="page-item"><a href="#" class="page-link">3</a></li>
            <li class="page-item">
                <a href="#" class="page-link"><span>&raquo;</span></a>
            </li>
        </ul>
    </nav>
</div>
