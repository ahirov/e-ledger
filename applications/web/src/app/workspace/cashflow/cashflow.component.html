<div class="el-cashflow-box mx-lg-4">
    <table class="table table-sm my-lg-2">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Item</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Something...</td>
            </tr>
            <tr>
                <th scope="row">2</th>
                <td>Something...</td>
            </tr>
        </tbody>
    </table>
    <p class="mb-2 text-end fw-bold">New record:</p>
    <form novalidate>
        <div
            *ngIf="modeService.savedMode === mode.Income"
            class="input-group mb-3">
            <span class="input-group-text">Range start:</span>
            <input
                type="text"
                class="form-control"
                bsDatepicker
                [bsConfig]="{ isAnimated: true }" />
        </div>
        <div
            *ngIf="modeService.savedMode === mode.Income"
            class="input-group mb-3">
            <span class="input-group-text">Range end:</span>
            <input
                type="text"
                class="form-control"
                bsDatepicker
                [bsConfig]="{ isAnimated: true }" />
        </div>
        <div
            *ngIf="modeService.savedMode === mode.Outcome"
            class="input-group mb-3">
            <span class="input-group-text">Date:</span>
            <input
                type="text"
                class="form-control"
                bsDatepicker
                [bsConfig]="{ isAnimated: true }" />
        </div>
        <div
            *ngIf="modeService.savedMode === mode.Income"
            class="input-group mb-3">
            <label class="input-group-text">Source:</label>
            <select class="form-select">
                <option value="1">Salary</option>
                <option value="2">Deposit</option>
            </select>
        </div>
        <div
            *ngIf="modeService.savedMode === mode.Outcome"
            class="input-group mb-3">
            <label class="input-group-text">Category:</label>
            <select class="form-select">
                <option value="0" selected>None</option>
                <option value="1">Food</option>
                <option value="2">Sport</option>
            </select>
        </div>
        <div
            *ngIf="modeService.savedMode === mode.Outcome"
            class="input-group mb-3">
            <span class="input-group-text">Description:</span>
            <input type="text" class="form-control" />
        </div>
        <div class="input-group">
            <input type="text" class="form-control" placeholder="0.00" />
            <span class="input-group-text">$</span>
        </div>
        <div class="d-flex justify-content-evenly my-4">
            <button type="submit" class="btn btn-primary w-25 fw-bold">
                Add
            </button>
            <button type="reset" class="btn btn-primary w-25 fw-bold">
                Clear
            </button>
        </div>
    </form>
</div>
