<table class="table table-sm my-0">
    <thead>
        <tr>
            <th>Date</th>
            <th>Details</th>
            <th>Category</th>
            <th>Sum, $</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let item of items; trackBy: getKey">
            <td>{{ item.date | date: "mediumDate" }}</td>
            <td
                [tooltip]="
                    item.description && item.description.length > truncateLength
                        ? item.description
                        : ''
                "
                placement="bottom">
                {{ item.description | truncate }}
            </td>
            <td>{{ item.category.name }}</td>
            <td>{{ item.sum.toFixed(2) }}</td>
            <td>
                <button
                    type="button"
                    class="btn btn-outline-danger"
                    (click)="onDelete(item)">
                    <img src="../../../assets/DeleteButton.svg" />
                </button>
            </td>
        </tr>
    </tbody>
</table>
