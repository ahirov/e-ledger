<div class="el-list-box">
    <div *ngIf="mode === MODE.Income">
        <table class="table table-sm my-0">
            <thead>
                <tr>
                    <th>From</th>
                    <th>To</th>
                    <th>Source</th>
                    <th>Sum, $</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of incomes">
                    <td>{{ item.from | date: "mediumDate" }}</td>
                    <td>{{ item.to | date: "mediumDate" }}</td>
                    <td>{{ item.source.name }}</td>
                    <td>{{ item.sum.toFixed(2) }}</td>
                    <td>
                        <button
                            type="button"
                            class="btn btn-outline-danger"
                            (click)="onIncomeDelete(item)">
                            <img src="../../../assets/DeleteButton.svg" />
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div *ngIf="mode === MODE.Outcome">
        <table class="table table-sm my-0">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Details</th>
                    <th>Category</th>
                    <th>Sum, $</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of outcomes">
                    <td>{{ item.date | date: "mediumDate" }}</td>
                    <td>{{ item.description | truncate }}</td>
                    <td>{{ item.category.name }}</td>
                    <td>{{ item.sum.toFixed(2) }}</td>
                    <td>
                        <button
                            type="button"
                            class="btn btn-outline-danger"
                            (click)="onOutcomeDelete(item)">
                            <img src="../../../assets/DeleteButton.svg" />
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
